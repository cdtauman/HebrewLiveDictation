# Reproducible UNSIGNED WinUI beta artifact (P4).
#
# This is the CI equivalent of the local `packaging\build_beta.ps1` proof: it freezes the Python
# sidecar into engine.exe, publishes the self-contained unpackaged WinUI shell, recovers VoiceType.pri
# (the unpackaged-publish gap), assembles the same dist\beta\VoiceType-beta layout, runs the packaged
# self-test (positive + negative hard-gate) and uploads the package as a workflow artifact.
#
# It deliberately does NOT touch the legacy build-release.yml pipeline (old Qt app, main + v* tags).
# The package is UNSIGNED -> SmartScreen "unknown publisher" applies. Not a final release.
name: WinUI beta (unsigned)

on:
  workflow_dispatch: {}
  push:
    branches:
      - feature/winui-redesign-migration
    tags:
      - 'beta-v*'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  DOTNET_VERSION: '9.0.x'

jobs:
  build-beta:
    name: Build & verify unsigned beta
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Packaging/security audit
        env:
          PYTHONPATH: src
        run: python scripts/packaging_audit.py

      # Gate 1: the engine's own test suite (same as the legacy workflow's test job).
      - name: Python unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

      # WindowsAppSDK 1.7 PRI generation (MrtCore.PriGen) is INCOMPATIBLE with the runner's preinstalled
      # .NET 10 SDK: the publish dies with MSB4062 (the ExpandPriContent task DLL is missing from the .NET 10
      # SDK's AppxPackage folder). setup-dotnet installs 9.0.x but the highest installed SDK (10) wins unless
      # pinned. Pin the build to .NET 9 via a WORKSPACE-ONLY global.json (NOT committed -> local builds on
      # .NET 9 or 10 are unaffected). latestFeature selects the highest 9.0.x present and never rolls to 10.
      - name: Pin .NET 9 SDK for the WinUI build (workspace global.json)
        shell: pwsh
        run: |
          $json = '{ "sdk": { "version": "9.0.100", "rollForward": "latestFeature", "allowPrerelease": false } }'
          Set-Content -Path global.json -Value $json -Encoding UTF8
          Write-Host "Pinned SDK; 'dotnet --version' now resolves to:"
          dotnet --version

      # The WindowsAppSDK 1.7 PRI generation task (ExpandPriContent, in Microsoft.Build.Packaging.Pri.Tasks.dll)
      # is a Visual Studio MSBuild component, NOT part of the base .NET SDK. The runner's clean dotnet SDK
      # (9 or 10) lacks it under <sdk>\Microsoft\VisualStudio\v17.0\AppxPackage\, so `dotnet publish` fails
      # with MSB4062. This step DIAGNOSES where the DLL lives on the runner (VS 2022 MSBuild) and, if found,
      # provisions the AppxPackage tasks into the SDK's expected folder so the SDK's MSBuild can load them.
      # Non-fatal: it prints diagnostics and never throws (so the build still runs and we learn the layout).
      - name: Provision WindowsAppSDK PRI task into the .NET SDK (CI workaround)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $sdkVer = (& dotnet --version).Trim()
          $sdkDir = Join-Path "$env:ProgramFiles\dotnet\sdk" $sdkVer
          $dll = 'Microsoft.Build.Packaging.Pri.Tasks.dll'
          Write-Host "SDK: $sdkVer ; SDK dir: $sdkDir"

          # Enumerate the runner's real VS layout (vswhere) so we know exactly what MSBuild trees exist.
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $searchRoots = @()
          if (Test-Path $vswhere) {
            Write-Host "=== vswhere -all ==="
            & $vswhere -all -prerelease -property installationPath | ForEach-Object {
              Write-Host "VS instance: $_"; if ($_ -and (Test-Path $_)) { $searchRoots += (Join-Path $_ 'MSBuild') }
            }
          } else { Write-Host "vswhere not present at $vswhere" }
          $searchRoots += @(
            "$env:ProgramFiles\Microsoft Visual Studio",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio",
            "$env:ProgramFiles\dotnet\sdk",
            "${env:ProgramFiles(x86)}\Windows Kits"
          )

          Write-Host "=== exhaustive search for $dll ==="
          $found = $null
          foreach ($r in ($searchRoots | Select-Object -Unique)) {
            if (Test-Path $r) {
              Get-ChildItem -Path $r -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                ForEach-Object { Write-Host "  located: $($_.FullName)"; if (-not $found) { $found = $_.DirectoryName } }
            }
          }

          if ($found) {
            # Mirror the AppxPackage tasks into BOTH plausible SDK version folders (v17.0 for .NET 9, v18.0 for .NET 10).
            foreach ($v in 'v17.0','v18.0') {
              $target = Join-Path $sdkDir "Microsoft\VisualStudio\$v\AppxPackage"
              New-Item -ItemType Directory -Force -Path $target | Out-Null
              Copy-Item -Force -Recurse (Join-Path $found '*') $target
              Write-Host "Provisioned -> $target (present: $(Test-Path (Join-Path $target $dll)))"
            }
          } else {
            Write-Host "RESULT: $dll is ABSENT from this runner (no VS MSIX/PRI build tasks). dotnet publish PRI generation will fail; this is a hosted-runner limitation."
          }

      # Builds the WinUI shell (dotnet publish, self-contained), freezes engine.exe (build_engine.ps1),
      # recovers VoiceType.pri, and assembles dist\beta\VoiceType-beta. CI has no .venv, so build_engine.ps1
      # falls back to the runner's `python` (which has the deps installed above).
      - name: Build unsigned beta layout
        shell: pwsh
        run: ./packaging/build_beta.ps1

      # Gate 2: packaged hard-gate. Copies the beta OUT-OF-REPO, runs --selftest --expect-packaged-engine
      # and HARD-GATES the deterministic packaging checks (engine.launch.mode PASS positive / FAIL when
      # engine.exe is renamed away + package-root winui_runtime_report.txt written). The two focus-safety
      # checks (focus.no_steal, hud.surface.no_steal) are ADVISORY here: they are environment-sensitive
      # (fail if any non-HUD window holds foreground) and non-deterministic on a shared/headless runner, so
      # they are reported but do NOT gate -- authoritative focus-safety is the P5 real-hardware matrix.
      # This still launches the WinUI GUI in --selftest mode; if a headless runner cannot create the XAML
      # windows at all, this step is the one that needs a real run to confirm (see docs "Reproducible beta in CI").
      # Bounded so a stuck GUI self-test can't burn the whole job timeout (verify_beta.ps1 polls ~40s/run).
      - name: Verify packaged beta (build/artifact hard-gate; focus checks advisory)
        timeout-minutes: 12
        shell: pwsh
        run: ./packaging/verify_beta.ps1

      # Collect BOTH preserved reports (positive non-focus-pass + negative hard-gate FAIL) from the out-of-repo
      # verify copy. if: always() so a failed verify is still inspectable. verify_beta.ps1 copies the
      # canonical report to distinct names after each phase before the next run overwrites it.
      - name: Stage self-test reports
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $base = Join-Path $env:TEMP 'vt-beta-verify'
          foreach ($n in 'winui_runtime_report.positive.txt','winui_runtime_report.negative.txt') {
            $src = Join-Path $base $n
            if (Test-Path $src) { Copy-Item $src (Join-Path 'artifacts' $n) -Force; Write-Host "Staged $n" }
            else { Write-Host "Missing $n (verify may not have reached this phase)." }
          }

      - name: Upload self-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winui-beta-selftest-reports
          path: |
            artifacts/winui_runtime_report.positive.txt
            artifacts/winui_runtime_report.negative.txt
          if-no-files-found: warn
          retention-days: 14

      # if: always() so the full package is preserved for debugging even when GUI verification fails.
      - name: Upload beta package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-winui-beta-unsigned
          path: dist/beta/VoiceType-beta
          if-no-files-found: error
          retention-days: 14

  # Tag-gated PRERELEASE attachment. Dormant until a `beta-v*` tag is pushed; never runs on a normal push.
  # Prepared but unsigned -- see docs for what remains (signing, release notes review) before this is "real".
  prerelease:
    name: Attach unsigned beta to GitHub prerelease
    needs: build-beta
    if: startsWith(github.ref, 'refs/tags/beta-v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download beta package
        uses: actions/download-artifact@v4
        with:
          name: VoiceType-winui-beta-unsigned
          path: VoiceType-beta

      - name: Zip beta package
        shell: pwsh
        run: Compress-Archive -Path 'VoiceType-beta\*' -DestinationPath "VoiceType-winui-beta-${{ github.ref_name }}.zip" -Force

      - name: Create GitHub prerelease (unsigned)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "VoiceType-winui-beta-${{ github.ref_name }}.zip" `
            --title "VoiceType WinUI beta ${{ github.ref_name }} (UNSIGNED)" `
            --prerelease `
            --notes "UNSIGNED local-shape WinUI beta produced by CI. Windows SmartScreen will show an 'unknown publisher' warning (More info -> Run anyway). Not code-signed, not a final release. Offline Whisper model is NOT bundled; install it from the app (Engine room)."
